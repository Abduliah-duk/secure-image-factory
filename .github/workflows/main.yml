name: Secure Image Factory
on: [push]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: docker build -t my-app:${{ github.sha }} .

      - name: Security Scan
        # This is the verified 'clean' commit hash from March 25, 2026
        uses: aquasecurity/trivy-action@57a97c7d9d5f75c2e5353c945761fa62b4056672
        with:
          image-ref: 'my-app:${{ github.sha }}'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push
        run: |
          REPO=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker tag my-app:${{ github.sha }} $REPO:latest
          docker push $REPO:latest